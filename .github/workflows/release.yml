name: Deploy

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      branch:
        description: The branch to deploy
        required: true
        default: main

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Set version
        run: |
          # Remove the "v" from the version.
          VERSION=$(echo ${{ github.ref_name }} | cut -b2-)
          echo "Version: ${VERSION}"

          sed -i 's/"version": "0.0.0-git"/"version": "'${VERSION}'"/' package.json

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@3 pages deploy dist --project-name=${{ secrets.CLOUDFLARE_PROJECT_NAME }} --branch=${{ github.event_name == 'workflow_dispatch' && inputs.branch || 'main' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
